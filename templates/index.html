<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摩擦力 AI 智慧解題系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            chtml: {
                displayAlign: 'left'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .result-box { background-color: #ffffff; border-left: 5px solid #0d6efd; padding: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="text-center mb-5">
                <h1 class="display-5 fw-bold text-primary">摩擦力 AI 智慧解題系統</h1>
                <p class="text-muted">支援水平面、斜面、拉力夾角等各種摩擦力題型。可直接輸入文字或上傳題目圖片！</p>
            </div>

            <div class="card mb-4">
                <div class="card-body p-4">
                    <form action="/" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label for="question" class="form-label fw-bold text-secondary">請輸入題目文字描述（若僅有圖片可留空）：</label>
                            <textarea class="form-control" id="question" name="question" rows="4" placeholder="例如：一個質量 5kg 的物體放在水平面上，靜摩擦係數為 0.5...外力施加 20N，求摩擦力與加速度。">{{ question }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label for="image_file" class="form-label fw-bold text-secondary">上傳題目圖片（支援手寫筆記、考卷截圖、課本拍照）：</label>
                            <input class="form-control" type="file" id="image_file" name="image_file" accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">開始 AI 精準解題 🚀</button>
                    </form>
                </div>
            </div>

            {% if result %}
            <div class="card">
                <div class="card-header bg-dark text-white fw-bold">
                    ✨ AI 老師解題分析結果
                </div>
                <div class="card-body p-4">
                    <div id="formatted-result" class="result-box"></div>
                </div>
            </div>

            <div id="raw-result" style="display:none;">{{ result }}</div>

            <script>
                // 1. 將後端傳回的 Markdown 轉成 HTML
                const rawMarkdown = document.getElementById('raw-result').innerText;
                document.getElementById('formatted-result').innerHTML = marked.parse(rawMarkdown);

                // 2. 通知 MathJax 重新渲染網頁中的數學公式
                if (window.MathJax && window.MathJax.typeset) {
                    window.MathJax.typeset();
                }
            </script>
            {% endif %}

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
